<div class="quantity-selector">

    <button
        class="btn quantity-btn"
        (click)="downQuantity()">

        -

    </button>

    <input
        type="text"
        class="quantity-input"
        [(ngModel)]="quantity">

    <button
        class="btn quantity-btn"
        (click)="upQuantity()">

        +

    </button>

</div>
