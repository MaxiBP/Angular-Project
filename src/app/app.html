<div class="d-flex flex-column min-vh-100">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="assets/images/logo.png" alt="OneStore Logo" class="logo me-2" />

        <span>{{ title() }}</span>
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" [routerLink]="['/']"> Home </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#"> Read the manga! </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#"> Pricing </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/about']"> About Us </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container flex-grow-1 mt-4">
    <router-outlet></router-outlet>
  </div>

  <footer class="bg-dark text-light py-4 mt-5">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-6">
          <h5 class="mb-1">OneStore</h5>
          <p class="mb-0 text-secondary">Tienda de wallpapers coleccionables de One Piece.</p>
        </div>

        <div class="col-md-6 text-md-end mt-3 mt-md-0">
          <small class="text-secondary">
            © 2026 OneStore - Proyecto realizado con Angular y Bootstrap
          </small>
        </div>
      </div>
    </div>
  </footer>
</div>
