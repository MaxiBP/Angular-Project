<table class="table">
  <thead>
    <tr>
      <th scope="col">image</th>
      <th scope="col">Name</th>
      <th scope="col">Type</th>
      <th scope="col">Price</th>
      <th scope="col">Stock</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td><img [src]="image.img" [alt]="image.name"></td>
      <td>{{image.name}}</td>
      <td>{{image.type}}</td>
      <td>{{image.price}}</td>
      <td>{{image.stock}}</td>
    </tr>
    <tr>
      <td><img class="img-fluid" [src]="image.img" [alt]="image.name"></td>
      <td>Zoro</td>
      <td>Common</td>
      <td>10</td>
      <td>8</td>
    </tr>
    <tr>
      <td><img src="assets/images/bg1.png" alt="image.name"></td>
      <td>Robin</td>
      <td>Special</td>
      <td>10</td>
      <td>8</td>
    </tr>
  </tbody>
</table>
